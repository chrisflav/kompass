<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 {{ svg_data.width }} {{ svg_data.height }}"
     width="{{ svg_data.width }}" height="{{ svg_data.height }}">
  <style>
    a { cursor: pointer; }
    a:hover rect { opacity: 0.82; }
  </style>
  <rect x="0" y="0" width="{{ svg_data.width }}" height="{{ svg_data.height }}" fill="white"/>
  <rect x="0" y="0" width="{{ svg_data.width }}" height="{{ svg_data.header_height }}" fill="#f0f0f0"/>
  <rect x="0" y="{{ svg_data.header_height }}" width="{{ svg_data.time_axis_width }}" height="{{ svg_data.height }}" fill="#f8f8f8"/>
  {% for tick in svg_data.time_ticks %}
  <line x1="{{ svg_data.time_axis_width }}" y1="{{ tick.y }}" x2="{{ svg_data.width }}" y2="{{ tick.y }}" stroke="#e0e0e0" stroke-width="1"/>
  <text x="{{ svg_data.time_axis_width }}" y="{{ tick.y }}" dx="-4" text-anchor="end" dominant-baseline="middle" font-size="11" fill="#888">{{ tick.label }}</text>
  {% endfor %}
  {% for day in svg_data.days %}
  <line x1="{{ day.x }}" y1="0" x2="{{ day.x }}" y2="{{ svg_data.height }}" stroke="#d0d0d0" stroke-width="1"/>
  <text x="{{ day.header_cx }}" y="{{ svg_data.header_mid_y }}" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="bold" fill="#333">{{ day.label }}</text>
  {% for g in day.groups %}
  <a href="{% url 'admin:members_group_change' g.group.pk %}">
    <rect x="{{ g.x }}" y="{{ g.y }}" width="{{ g.width }}" height="{{ g.height }}" fill="#4a90d9" rx="4" ry="4"/>
    <text text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="bold" fill="white">{% for line in g.name_lines %}<tspan x="{{ g.cx }}" {% if forloop.first %}y="{{ g.name_y }}"{% else %}dy="{{ g.line_height }}"{% endif %}>{{ line }}</tspan>{% endfor %}</text>
  </a>
  {% endfor %}
  {% endfor %}
  <line x1="0" y1="0" x2="0" y2="{{ svg_data.height }}" stroke="#d0d0d0" stroke-width="1"/>
  <line x1="0" y1="0" x2="{{ svg_data.width }}" y2="0" stroke="#d0d0d0" stroke-width="1"/>
  <line x1="{{ svg_data.width }}" y1="0" x2="{{ svg_data.width }}" y2="{{ svg_data.height }}" stroke="#d0d0d0" stroke-width="1"/>
  <line x1="0" y1="{{ svg_data.height }}" x2="{{ svg_data.width }}" y2="{{ svg_data.height }}" stroke="#d0d0d0" stroke-width="1"/>
  <line x1="0" y1="{{ svg_data.header_height }}" x2="{{ svg_data.width }}" y2="{{ svg_data.header_height }}" stroke="#c0c0c0" stroke-width="1"/>
</svg>
